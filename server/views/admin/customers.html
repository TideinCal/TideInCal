<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Customers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div id="adminNav"></div>
  <main class="container pb-5">
    <h1 class="h3 mb-4">Customer search</h1>
    <form id="searchForm" class="row g-2 mb-4">
      <div class="col-md-8">
        <label for="queryInput" class="visually-hidden">Search</label>
        <input type="text" class="form-control" id="queryInput" name="query" placeholder="Email, name, user id, cus_, sub_, cs_, pi_, purchase id…" autocomplete="off">
      </div>
      <div class="col-md-4">
        <button type="submit" class="btn btn-primary w-100">Search</button>
      </div>
    </form>
    <div id="searchResults"></div>
  </main>
  <script src="/js/admin/common.js"></script>
  <script src="/js/admin/customers.js"></script>
</body>
</html>
