<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - TideInCal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-deepnav shadow-sm fixed-top" id="topNav">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="/img/logo.png" alt="TideInCal" width="28" height="28" class="rounded">
        <span class="fw-bold">TideInCal</span>
      </a>
      <div class="d-none d-sm-flex align-items-center gap-3">
        <a href="/" class="btn btn-outline-light btn-sm">Home</a>
      </div>
    </div>
  </nav>

  <main class="container mt-5 pt-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="text-center mb-5">
          <h1 class="display-5 fw-bold text-primary mb-3">Reset Password</h1>
          <p class="lead text-muted">Choose a new password for your account.</p>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div id="resetError" class="alert alert-warning d-none" role="alert"></div>
            <div id="resetSuccess" class="alert alert-success d-none" role="alert">
              Password updated. You can now log in.
            </div>
            <form id="resetPasswordForm">
              <div class="mb-3">
                <label for="resetPassword" class="form-label">New Password</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="resetPassword" name="password" required minlength="8" pattern="(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}" title="At least 8 characters with a number and a special character.">
                  <button class="btn btn-outline-secondary" type="button" data-password-toggle data-target="resetPassword" aria-label="Show password">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div class="form-text">At least 8 characters with a number and a special character.</div>
              </div>
              <div class="mb-3">
                <label for="resetPasswordConfirm" class="form-label">Confirm New Password</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="resetPasswordConfirm" name="confirmPassword" required minlength="8" pattern="(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}" title="At least 8 characters with a number and a special character.">
                  <button class="btn btn-outline-secondary" type="button" data-password-toggle data-target="resetPasswordConfirm" aria-label="Show password">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <button type="submit" class="btn btn-outline-primary w-100">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="container-fluid" id="footer" style="margin-top: auto;">
    <footer id="foot" class="text-center py-4 mt-4">
      <p class="mb-0">Contact: <a href="mailto:TideInCal@gmail.com" class="text-info text-decoration-none">TideInCal@gmail.com</a></p>
      <p class="mb-1">&copy; 2025 TideInCal.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/js/resetPassword.js"></script>
</body>
</html>
